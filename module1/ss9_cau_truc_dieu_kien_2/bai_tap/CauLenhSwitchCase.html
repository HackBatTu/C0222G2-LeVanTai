<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<input type="text">
<button type="button" >Tính số Ngày</button>
<script>
    let a = parseInt(prompt("nhập số tháng: "));

    switch (a) {
        case 1 :
        case 3 :
        case 5 :
        case 7 :
        case 8 :
        case 10 :
        case 12:

            alert('31 ngày');
            break;
        case 2 :
            alert('28 ngày || 29 ngày ');
            break;
        case 4 :
        case 6 :
        case 9 :
        case 11 :
            alert('30 ngày');
            break;
    }

</script>
</body>
</html>
