<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<script>

    function isPrime(numBer) {
        flag = true
        if (numBer < 2) {
            flag = false
        } else if (numBer === 2) {
            flag = true
        } else if (numBer % 2 === 0) {
            flag = false
        } else {
            for (let i = 3; i < Math.sqrt(numBer); i += 2) {
                if (numBer % i === 0 ) {
                    flag = true
                    break
                }
            }
        }
        if (flag === true) {
            console.log('number là số nguyên tố ')
        } else {
            console.log('number không phải là số nguyên tố ')
        }

    }
    let number = prompt('nhập số')
    isPrime(number)

</script>
</body>
</html>
